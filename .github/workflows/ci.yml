name: Deploy TOiR landing

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-toir-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_HOST: 91.207.75.72
  DEPLOY_PATH: /opt/masterdoc-toir
  WEB_ROOT: /var/www/toir.masterdoc.pro
  SITE_HOST: toir.masterdoc.pro

jobs:
  check:
    name: Check landing files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify landing
        run: |
          test -f landing/index.html
          test -f landing/styles.css
          test -f landing/main.js
          test -d landing/assets
          echo "Landing OK"

  deploy:
    name: Deploy to ${{ env.SITE_HOST }}
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy secrets
        env:
          KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          USER_NAME: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$KEY" || { echo "Add repository secret DEPLOY_SSH_PRIVATE_KEY"; exit 1; }
          test -n "$USER_NAME" || { echo "Add repository secret DEPLOY_USER"; exit 1; }

      - name: Load SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_ed25519
          chmod 600 ~/.ssh/deploy_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare directories on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p ${DEPLOY_PATH} ${WEB_ROOT}"

      - name: Rsync static site
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -i $HOME/.ssh/deploy_ed25519 -o IdentitiesOnly=yes" \
            landing/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${WEB_ROOT}/"

      - name: Rsync nginx config and install script
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -avz \
            -e "ssh -i $HOME/.ssh/deploy_ed25519 -o IdentitiesOnly=yes" \
            deploy/toir.masterdoc.pro.nginx.conf \
            deploy/toir.masterdoc.pro.nginx.http.conf \
            deploy/install-toir-nginx.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Install nginx site and TLS
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x ${DEPLOY_PATH}/install-toir-nginx.sh && \
             DEPLOY_PATH='${DEPLOY_PATH}' SITE_HOST='${SITE_HOST}' WEB_ROOT='${WEB_ROOT}' \
             CERTBOT_EMAIL='${CERTBOT_EMAIL:-admin@masterdoc.pro}' \
             ${DEPLOY_PATH}/install-toir-nginx.sh"

      - name: Smoke (HTTPS or HTTP)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "curl -fsS https://${SITE_HOST}/ | head -c 500" \
          || ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "curl -fsS http://127.0.0.1/ -H 'Host: ${SITE_HOST}' | head -c 500; nginx -t; systemctl status nginx --no-pager | head -20"
