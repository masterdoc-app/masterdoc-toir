# fixaverse.ru — static landing (HTTPS)

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fixaverse.ru www.fixaverse.ru;

    ssl_certificate /etc/letsencrypt/live/fixaverse.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fixaverse.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/fixaverse.ru;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name fixaverse.ru www.fixaverse.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://fixaverse.ru$request_uri;
    }
}
